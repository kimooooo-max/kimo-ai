<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>오늘 저녁 뭐 먹지?</title>
    <meta name="description" content="자취생 저녁 한 끼 메뉴를 랜덤으로 추천해 주는 작은 웹앱" />
    <meta name="theme-color" content="#116b5c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="저녁룰렛" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <p class="eyebrow">오늘 저녁 뭐 먹지?</p>
        <h1>자취 저녁 룰렛</h1>
        <p class="sub">고민은 그만. 버튼 한 번이면 오늘 저녁 한 끼가 정해집니다.</p>
      </header>

      <section class="filters" aria-label="메뉴 필터">
        <div class="filter-group">
          <span class="filter-label">종류</span>
          <div class="chips" id="catChips"></div>
        </div>
        <div class="filter-group">
          <span class="filter-label">난이도</span>
          <div class="chips" id="levelChips"></div>
        </div>
      </section>

      <section class="result-card" id="resultCard" aria-live="polite">
        <div class="result-emoji" id="resultEmoji">🍽️</div>
        <h2 class="result-name" id="resultName">버튼을 누르면 메뉴가 떠요</h2>
        <div class="result-tags" id="resultTags"></div>
        <div class="result-ing" id="resultIng"></div>
        <p class="result-tip" id="resultTip" hidden></p>
        <div class="result-actions" id="resultActions" hidden>
          <button class="fav-btn" id="favBtn" type="button">🤍 찜</button>
          <a class="recipe-link yt" id="ytLink" target="_blank" rel="noopener">▶ 유튜브 레시피</a>
          <a class="recipe-link" id="recipeLink" target="_blank" rel="noopener">📖 만개의레시피</a>
        </div>
      </section>

      <button class="roll-btn" id="rollBtn" type="button">🎲 오늘 저녁 추천!</button>
      <p class="count" id="count"></p>

      <section class="favs" id="favs" hidden>
        <h3>🔖 찜한 메뉴</h3>
        <div class="fav-list" id="favList"></div>
      </section>

      <footer class="foot">
        <p>도저히 안 땡기면? <strong>그냥 시켜 먹어요.</strong> 그것도 훌륭한 저녁입니다 🛵</p>
      </footer>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
