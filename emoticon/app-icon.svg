  <!-- sparkle top-right -->
  <line x1="80" y1="14" x2="80" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="75" y1="19" x2="85" y2="19" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
