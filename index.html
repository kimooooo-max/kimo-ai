<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>카드 기장 도우미</title>
    <meta name="theme-color" content="#116b5c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="카드기장" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./app-icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Card Ledger</p>
            <h1>카드 기장 도우미</h1>
          </div>
          <div class="actions">
            <button id="exportCsv" class="secondary" type="button">CSV</button>
            <button id="clearAll" class="danger" type="button">전체 삭제</button>
          </div>
        </header>

        <section class="input-panel">
          <label id="dropZone" class="drop-zone" for="fileInput">
            <input id="fileInput" type="file" accept="image/*" multiple />
            <span class="drop-icon">+</span>
            <span class="drop-title">카드 사용 내역 캡쳐 첨부</span>
            <span class="drop-help">이미지를 누르거나 끌어다 놓으면 날짜, 금액, 카테고리를 추출합니다.</span>
          </label>

          <div class="preview-panel">
            <img id="previewImage" alt="첨부 이미지 미리보기" />
            <div id="emptyPreview" class="empty-preview">첨부한 캡쳐가 여기에 표시됩니다.</div>
          </div>
        </section>

        <section class="status-panel">
          <div>
            <strong id="statusTitle">대기 중</strong>
            <p id="statusText">카드사 앱, 문자, 알림 캡쳐 이미지를 첨부해 주세요.</p>
          </div>
          <progress id="ocrProgress" value="0" max="100"></progress>
        </section>

        <section class="editor-grid">
          <form id="entryForm" class="entry-form">
            <div class="field-row two">
              <label>
                날짜
                <input id="dateInput" type="date" required />
              </label>
              <label>
                금액
                <input id="amountInput" type="number" min="0" step="1" placeholder="0" required />
              </label>
            </div>

            <div class="field-row two">
              <label>
                사용처
                <input id="merchantInput" type="text" placeholder="예: 스타벅스" />
              </label>
              <label>
                카테고리
                <select id="categoryInput">
                  <option>식비</option>
                  <option>카페/간식</option>
                  <option>교통</option>
                  <option>주유/차량</option>
                  <option>쇼핑</option>
                  <option>생활/마트</option>
                  <option>통신/구독</option>
                  <option>의료</option>
                  <option>교육</option>
                  <option>여행/숙박</option>
                  <option>접대/업무</option>
                  <option>기타</option>
                </select>
              </label>
            </div>

            <label>
              OCR 원문
              <textarea id="rawTextInput" rows="8" placeholder="이미지에서 인식한 문장이 표시됩니다."></textarea>
            </label>

            <button class="primary" type="submit">내역 저장</button>
          </form>

          <section class="ledger">
            <div class="ledger-header">
              <h2>저장된 내역</h2>
              <strong id="totalAmount">0원</strong>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>날짜</th>
                    <th>사용처</th>
                    <th>카테고리</th>
                    <th class="amount-col">금액</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="ledgerBody"></tbody>
              </table>
            </div>
          </section>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
